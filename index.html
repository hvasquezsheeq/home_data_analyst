<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Banner</title>

  <style>
    body {
      margin: 0;
      background: #f5f5f5;
    }

    .banner {
      width: 100%;
      height: 300px; /* ajusta altura aquí */
      overflow: hidden;
    }

    .banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
  </style>
</head>

<body>

  <div class="banner">
    <img src="banner.png" alt="Banner corporativo">
  </div>

</body>
</html>
