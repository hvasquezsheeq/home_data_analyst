<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banner Espacio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: Arial, sans-serif;
    }

    .hero {
      width: 100%;
      height: 100vh;
      background-image: url('banner_home.png'); /* cambia esto */
      background-position: center;
      background-repeat: no-repeat;
      background-size: contain; /* 👈 CLAVE para ver completa */
      background-color: black; /* relleno si sobran espacios */
      display: flex;
      align-items: center;
      padding-left: 5%;
    }

    .texto {
      color: white;
      max-width: 500px;
      font-size: 2.5rem;
      font-weight: bold;
      line-height: 1.2;
    }

    @media (max-width: 768px) {
      .texto {
        font-size: 1.8rem;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="texto">
    
    </div>
  </section>

</body>
</html>
